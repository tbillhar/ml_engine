name: Build Windows Executable

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Diagnostics - show sklearn/scipy package paths
        shell: bash
        run: |
          python - << 'PY'
          import sklearn, scipy
          from pathlib import Path

          print("sklearn:", sklearn.__file__)
          print("scipy:", scipy.__file__)

          sk_path = Path(sklearn.__file__).parent
          sp_path = Path(scipy.__file__).parent

          print("sklearn/.libs exists:", (sk_path / ".libs").exists())
          print("scipy/.libs exists:", (sp_path / ".libs").exists())

          if (sk_path / ".libs").exists():
              print("sklearn/.libs contents:")
              for p in (sk_path / ".libs").iterdir():
                  print(" -", p.name)

          if (sp_path / ".libs").exists():
              print("scipy/.libs contents:")
              for p in (sp_path / ".libs").iterdir():
                  print(" -", p.name)
          PY

      - name: Build GUI from spec
        run: |
          pyinstaller --noconfirm --clean FXMLPipeline.spec

      - name: Diagnostics - show bundled sklearn folders
        run: |
          dir dist\FXMLPipeline\_internal\sklearn
          if exist dist\FXMLPipeline\_internal\sklearn\.libs (
            echo sklearn .libs exists
            dir dist\FXMLPipeline\_internal\sklearn\.libs
          ) else (
            echo sklearn .libs is missing
          )

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: FXMLPipeline-windows
          path: dist/FXMLPipeline/
          if-no-files-found: error
